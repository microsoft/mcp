name: Vally evaluations
description: |
  Evaluates E2E prompts to ensure they still pass when tools are changed.

on:
  pull_request:
    paths:
      - 'tools/**'
      - '.vally.yaml'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Is Debug'
        required: false
        default: false
        type: boolean

permissions:
  copilot-requests: write
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5.4.0

      - run: npm install -g @microsoft/vally-cli

      - name: Set BUILD_REASON environment variable
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          echo "BUILD_REASON=PullRequest" >> $GITHUB_ENV
          echo "SYSTEM_PULLREQUEST_TARGETBRANCH=${{ github.base_ref }}" >> $GITHUB_ENV
          echo "SYSTEM_PULLREQUEST_SOURCECOMMITID=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV

      - name: Create build_info.json
        shell: pwsh
        run: |
          if ($env:BUILD_REASON -eq 'PullRequest') {
            Write-Host "Run type: PR run."
          }
          else {
            Write-Host "Run type: manual run"
          }

          ./eng/scripts/New-BuildInfo.ps1 -ServerName Azure.Mcp.Server

      - name: Build server code
        shell: pwsh
        run: |
          $rid = [System.Runtime.InteropServices.RuntimeInformation]::RuntimeIdentifier
          $parts = $rid.Split('-')
          $dotnetOs = $parts[0]
          $arch = $parts[1]

          $platformOs = switch -Regex ($dotnetOs) {
            '^linux$' { 'linux' }
            '^osx$' { 'macos' }
            '^win' { 'windows' }
            default { throw "Unsupported runtime OS '$dotnetOs' from RID '$rid'" }
          }

          $platformName = "$platformOs-$arch"
          Write-Host "Current RID: $rid"
          Write-Host "Using build platform: $platformName"

          ./eng/scripts/Build-Code.ps1 -BuildInfoPath "${{ github.workspace }}/.work/build_info.json" -PlatformName $platformName

      - name: Create vally evaluations
        run: dotnet run --project '${{ github.workspace }}/eng/tools/VallyEvaluator/src/VallyEvaluator.csproj' -- --buildInfo '${{ github.workspace }}/.work/build_info.json'

      - name: Run vally
        run: |
          $isDebug = '${{ github.event.inputs.logLevel }}' -eq 'true'
          $buildInfo = '${{ github.workspace }}/.work/build_info.json'
          $evalsDirectory = '${{ github.workspace }}/.work/evals'
          $outputPath = '${{ github.workspace }}/.work/vally-results'

          ./eng/scripts/Invoke-VallyEvalTests.ps1 -BuildInfoPath $buildInfo -EvalsDirectory $evalsDirectory -OutputPath $outputPath -IsDebug:$isDebug
        shell: pwsh
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Upload vally results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: vally-results
          path: ${{ github.workspace }}/.work/vally-results
          if-no-files-found: warn
