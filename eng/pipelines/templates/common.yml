parameters:
- name: ServerName
  type: string
  default: ''
- name: PublishTarget
  type: string
  default: none
  values: [none, internal, public ]
- name: RunLiveTests
  type: boolean
  default: false
- name: IncludeNative
  type: boolean
  default: false
- name: PackageDocker
  type: boolean
  default: false
- name: PackageVSIX
  type: boolean
  default: false
- name: IsTestPipeline
  type: boolean
  default: false
  # Test pipelines (e.g. Template.Mcp.Server) can release to public feeds, but they always use prerelease tags and automatically close their version bump PRs
  # This allows us to run them multiple times from the same commit without hitting github release tag or package deployment conflicts

resources:
  repositories:
  - repository: azure-sdk-build-tools
    type: git
    name: internal/azure-sdk-build-tools
    ref: refs/heads/users/pahallis/loose-pdb-files

extends:
  template: /eng/pipelines/templates/1es-redirect.yml
  parameters:
    # We pick a single internal pipeline to use for autoBaseline. This should be a pipeline that runs often on main with normal code paths, i.e. not Template.Mcp.Server
    autoBaseline: ${{ and(eq(variables['Build.DefinitionName'], 'mcp - Azure.Mcp.Server'), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['System.TeamProject'], 'internal')) }}
    stages:
    - stage: Initialize
      pool:
        name: $(LINUXPOOL)
        image: $(LINUXVMIMAGE)
        os: linux
      variables:
      - template: /eng/pipelines/templates/variables/image.yml
      - template: /eng/pipelines/templates/variables/globals.yml
      jobs:
      - job: Initialize
        steps:
        - task: DownloadPipelineArtifact@2
          displayName: Download binaries_signed artifact
          inputs:
            buildType: specific
            project: $(System.TeamProjectId)
            definition: $(Build.DefinitionId)
            buildVersionToDownload: specific
            buildId: 5724729
            artifactName: binaries_signed
            targetPath: $(Pipeline.Workspace)/binaries_signed

        - template: /eng/common/pipelines/templates/steps/publish-1es-artifact.yml
          parameters:
            ArtifactPath: $(Pipeline.Workspace)/binaries_signed
            ArtifactName: binaries_signed

      - template: /eng/pipelines/templates/jobs/publish-symbols.yml
