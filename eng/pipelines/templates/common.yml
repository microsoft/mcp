parameters:
- name: ServerName
  type: string
  default: ''
- name: PublishTarget
  type: string
  default: none
  values: [none, internal, public ]
- name: RunLiveTests
  type: boolean
  default: false
- name: IncludeNative
  type: boolean
  default: false
- name: PackageDocker
  type: boolean
  default: false
- name: PackageVSIX
  type: boolean
  default: false
- name: PackagePyPI
  type: boolean
  default: false
- name: PackageMCPB
  type: boolean
  default: false
- name: RunVSCodeIntegrationTests
  type: boolean
  default: false
- name: TestTimeoutInMinutes
  type: number
  default: 30
- name: IsTestPipeline
  type: boolean
  default: false
  # Test pipelines (e.g. Template.Mcp.Server) can release to public feeds, but they always use prerelease tags and automatically close their version bump PRs
  # This allows us to run them multiple times from the same commit without hitting github release tag or package deployment conflicts

resources:
  repositories:
  - repository: azure-sdk-build-tools
    type: git
    name: internal/azure-sdk-build-tools
    ref: refs/tags/azure-sdk-build-tools_20251112.1

extends:
  template: /eng/pipelines/templates/1es-redirect.yml
  parameters:
    # We pick a single internal pipeline to use for autoBaseline. This should be a pipeline that runs often on main with normal code paths, i.e. not Template.Mcp.Server
    stages:
    - stage: Test
      pool:
        name: $(LINUXPOOL)
        image: $(LINUXVMIMAGE)
        os: linux
      variables:
      - template: /eng/pipelines/templates/variables/image.yml
      - template: /eng/pipelines/templates/variables/globals.yml
      jobs:
      - job: Test
        variables:
        # express the variables and parameters as a json string for dumping
        - name: DevOpsVariables
          value: $[ convertToJson(variables) ]
        # express the variables and parameters as a json string for dumping
        - name: DevOpsParameters
          value: ${{ convertToJson(parameters) }}
        steps:
        - pwsh: |
            # dump the devops variables so we can see triggering info
            Write-Host $env:DEVOPSVARIABLES
          displayName: Variables
        - pwsh: |
            # dump the devops parameters so we can see triggering info
            Write-Host $env:DEVOPSPARAMETERS
          displayName: Parameters