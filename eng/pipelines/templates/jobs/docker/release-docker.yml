parameters:
- name: ContainerRegistry
  type: string
  default: 'azuresdkimages'
- name: DeploymentEnvironment
  type: string
  default: 'public'
- name: DependsOn
  type: object

jobs:
- job: PublishACR
  displayName: "Publish to ACR"
  dependsOn: ${{ parameters.DependsOn }}
  condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
  templateContext:
    type: releaseJob
    isProduction: true
  environment: package-publish
  timeoutInMinutes: 120
  pool:
    name: azsdk-pool
    image: ubuntu-24.04
    os: linux
  strategy:
    runOnce:
      deploy:
        steps:
        # Download the pre-built image tar artifact produced in the SignAndPack stage (pack-docker.yml)
        # Assumes pack-docker.yml was updated to publish an artifact named 'docker_staged' containing 'image.tar'.
        - download: current
          artifact: docker_staged
          displayName: Download built image tar

        - task: AzureCLI@2
          displayName: Login to ${{ parameters.ContainerRegistry }}
          inputs:
            azureSubscription: "Azure SDK Engineering System"
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name ${{ parameters.ContainerRegistry }}

        - script: |
            echo "Loading image..."
            docker load -i $(Pipeline.Workspace)/docker_staged/image.tar
          displayName: Load image

        - script: |
            VERSION=$(DockerImageVersion)
            NAME=$(DockerImageName)
            ACR=${{ parameters.ContainerRegistry }}.azurecr.io
            ENV=${{ parameters.DeploymentEnvironment }}

            # LOCAL_TAG must match the tag used when the image was originally built & saved.
            LOCAL_TAG="$(Build.Repository.Name)/server:$(Build.BuildId)"
            VERSION_TAG="$ACR/$ENV/$NAME:$VERSION"
            LATEST_TAG="$ACR/$ENV/$NAME:latest"

            echo "Tagging $LOCAL_TAG as:"
            echo "  $VERSION_TAG"
            echo "  $LATEST_TAG"

            docker tag $LOCAL_TAG $VERSION_TAG
            docker tag $LOCAL_TAG $LATEST_TAG

            echo "Pushing version tag..."
            docker push $VERSION_TAG
            echo "Pushing latest tag..."
            docker push $LATEST_TAG

            echo "Done."
          displayName: Push image to ACR
