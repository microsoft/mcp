parameters:
- name: ContainerRegistry
  type: string
  default: 'azuresdkimages'
- name: DeploymentEnvironment
  type: string
  default: 'public'
- name: DependsOn
  type: object

jobs:
- job: PublishACR
  displayName: "Publish to ACR"
  dependsOn: ${{ parameters.DependsOn }}
  condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
  templateContext:
    type: releaseJob
    isProduction: true
  environment: package-publish
  timeoutInMinutes: 120
  pool:
    name: azsdk-pool
    image: ubuntu-24.04
    os: linux
  strategy:
    runOnce:
      deploy:
        steps:
        - download: current
          artifact: docker_output
          displayName: Download built image .tar

        - task: AzureCLI@2
          displayName: Login to ${{ parameters.ContainerRegistry }}
          inputs:
            azureSubscription: "Azure SDK Engineering System"
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name ${{ parameters.ContainerRegistry }}

        - script: |
            echo "Loading image..."
            docker load -i $(Pipeline.Workspace)/docker_output/image.tar
            docker image inspect "$(DockerLocalTag)" >/dev/null 2>&1 || { echo "Local tag $(DockerLocalTag) not found after load"; exit 1; }
          displayName: Load image

        - script: |
            if [ -z "$(DockerImageVersion)" ] || [ -z "$(DockerImageName)" ]; then
              echo "ERROR: Required tag components missing (version='$(DockerImageVersion)', name='$(DockerImageName)')" >&2
              exit 1
            fi

            BASE_REPO="${{ parameters.ContainerRegistry }}.azurecr.io/${{ parameters.DeploymentEnvironment }}/$(DockerImageName)"

            echo "Base repository: $BASE_REPO"

            VERSIONED_TAG="$BASE_REPO:$(DockerImageVersion)"
            LATEST_TAG="$BASE_REPO:latest"

            echo "Tagging $(DockerLocalTag) as:"
            echo "  Versioned tag: $VERSIONED_TAG"
            echo "  Latest tag: $LATEST_TAG"

            docker tag "$(DockerLocalTag)" "$VERSIONED_TAG"
            docker tag "$(DockerLocalTag)" "$LATEST_TAG" 

            echo "Pushing versioned tag..."
            docker push "$VERSIONED_TAG"
            echo "Pushing latest tag..."
            docker push "$LATEST_TAG"

            echo "Done."
          displayName: Push image to ACR
