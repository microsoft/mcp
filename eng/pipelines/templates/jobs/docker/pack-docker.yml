parameters:
- name: DependsOn
  type: object
- name: ServerName
  type: string

jobs:
- job: BuildDockerImage
  displayName: "Build Docker image"
  dependsOn: ${{ parameters.DependsOn }}
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - checkout: self

  - download: current
    displayName: Download build_info
    artifact: build_info

  - download: current
    displayName: Download binaries_signed
    artifact: binaries_signed

  - task: Powershell@2
    displayName: "Prepare files for Docker"
    inputs:
      pwsh: true
      filePath: $(Build.SourcesDirectory)/eng/scripts/Prepare-Docker.ps1
      arguments: >
        -ArtifactsPath '$(Pipeline.Workspace)/binaries_signed'
        -BuildInfoPath '$(Pipeline.Workspace)/build_info/build_info.json'
        -OutputPath '$(Build.ArtifactStagingDirectory)'

  - task: Powershell@2
    displayName: 'Set Docker Variables'
    name: SetVariables
    inputs:
      targetType: 'inline'
      script: |
        $buildInfo = Get-Content -Raw -Path "$(Pipeline.Workspace)/build_info/build_info.json" | ConvertFrom-Json
        $serverInfo = $buildInfo.servers | Where-Object { $_.Name -eq $env:SERVER_NAME } | Select-Object -First 1

        if (-not $serverInfo) {
            Write-Error "Server with name '$env:SERVER_NAME' not found in buildInfo.json"
            exit 1
        }

        $imageName = $serverInfo.dockerImageName
        Write-Host "Setting variable DockerImageName to $imageName"
        Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$imageName"

        $version = $serverInfo.version
        Write-Host "Setting variable DockerImageVersion to $version"
        Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version"

        $dockerLocalTag = "$imageName:$(Build.BuildId)"
        Write-Host "Setting variable DockerLocalTag to $dockerLocalTag."
        Write-Host "##vso[task.setvariable variable=DockerLocalTag]$dockerLocalTag"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag;isOutput=true]$dockerLocalTag"
    env:
      SERVER_NAME: ${{ parameters.ServerName }}

  - task: 1ES.BuildContainerImage@1
    displayName: Build Docker Image
    inputs:
      path: "$(Build.ArtifactStagingDirectory)"
      image: "$(DockerLocalTag)"
      buildArguments: |
        --build-arg PUBLISH_DIR="${{ parameters.ServerName }}/linux-x64/dist"
      enableNetwork: true
      useBuildKit: true
  
  - script: |
      set -euo pipefail
      echo "Capturing image digest for $(DockerLocalTag)"
      digest="$(docker inspect --format='{{index .Id}}' "$(DockerLocalTag)")"
      if [ -z "$digest" ]; then
        echo "ERROR: Could not resolve image ID for $(DockerLocalTag)" >&2
        docker images | head
        exit 1
      fi
      echo "Image digest: $digest"
      echo "##vso[task.setvariable variable=DockerImageDigest;isOutput=true]$digest"
      echo "Saving image"
      docker save "$(DockerLocalTag)" -o "$(Build.ArtifactStagingDirectory)/image.tar"
      ls -lh "$(Build.ArtifactStagingDirectory)/image.tar"
    displayName: Capture image digest and save as .tar

  - task: 1ES.PublishPipelineArtifact@1
    inputs:
      path: $(Build.ArtifactStagingDirectory)
      artifact: docker_staged
