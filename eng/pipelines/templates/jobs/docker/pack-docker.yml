parameters:
- name: ServerName
  type: string
- name: DependsOn
  type: object

jobs:
- job: CreateDockerArtifact
  displayName: 'Build Docker image'
  dependsOn: ${{ parameters.DependsOn }}
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - task: DownloadPipelineArtifact@2
    displayName: 'Download signed packages'
    inputs:
      buildType: 'current'
      artifactName: binaries_signed
      targetPath: $(Build.ArtifactStagingDirectory)

  - task: CopyFiles@2
    displayName: 'Copy Dockerfile'
    inputs:
      Contents: 'Dockerfile'
      TargetFolder: $(Build.ArtifactStagingDirectory)

  - task: Powershell@2
    displayName: 'Set Docker Variables'
    name: SetVariables
    inputs:
      targetType: 'inline'
      script: |
        $properties = ./eng/scripts/Get-ProjectProperties.ps1 -ProjectName '${{parameters.ServerName}}.csproj'
        $imageName = $properties.DockerImageName
        $version = $properties.Version
        Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$imageName"
        Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version$VersionSuffix"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag;isOutput=true]$(Build.Repository.Name)/server:$(Build.BuildId)"
    env:
      VERSION_SUFFIX: '$(VersionSuffix)'

  - task: 1ES.BuildContainerImage@1
    displayName: Build Docker Image
    inputs:
      path: '$(Build.ArtifactStagingDirectory)'
      image: $(Build.Repository.Name)/server:$(Build.BuildId)
      buildArguments: |
        --build-arg PUBLISH_DIR="Azure.Mcp.Server/linux-x64/dist"
      enableNetwork: true
      useBuildKit: true

  - script: |
      echo "Running container tests..."
      echo "Calling 'azmcp tools list'"
      # Override entrypoint to list tools directly instead of starting the server
      mkdir -p $(Build.ArtifactStagingDirectory)/docker_output
      docker run --rm --entrypoint ./azmcp $(Build.Repository.Name)/server:$(Build.BuildId) tools list > $(Build.ArtifactStagingDirectory)/docker_output/tools.json
      echo "tools list output (truncated):"
      head -n 40 $(Build.ArtifactStagingDirectory)/docker_output/tools.json || true
      if grep -q '"status"[[:space:]]*:[[:space:]]*200' $(Build.ArtifactStagingDirectory)/docker_output/tools.json; then
        echo "Status 200 confirmed in tools list output.";
      else
        echo "ERROR: tools list output did not contain status 200" >&2; exit 1;
      fi
    displayName: Run container smoke tests
  
  - script: |
      set -euo pipefail
      IMAGE_TAG="$(Build.Repository.Name)/server:$(Build.BuildId)"
      echo "Capturing image digest for $IMAGE_TAG"
      digest=$(docker inspect --format='{{index .Id}}' "$IMAGE_TAG")
      echo "Image digest: $digest"
      echo "##vso[task.setvariable variable=DockerImageDigest;isOutput=true]$digest"
      echo "Saving image"
      docker save $IMAGE_TAG -o $(Build.ArtifactStagingDirectory)/docker_output/image.tar
      ls -lh $(Build.ArtifactStagingDirectory)/docker_output/image.tar
    name: CaptureImage
    displayName: Capture image digest and save tar

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish docker staging artifact (includes image.tar)'
    inputs:
      path: $(Build.ArtifactStagingDirectory)
      artifact: docker_output