parameters:
- name: ServerName
  type: string

jobs:
- job: CreateDockerArtifact
  displayName: "Build Docker image"
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - task: DownloadPipelineArtifact@2
    displayName: Download signed MCP server binaries from specific run
    inputs:
      buildType: specific
      project: $(System.TeamProject)
      pipeline: $(System.DefinitionId) # or a literal ID if different pipeline
      runVersion: specific # required to honor runId
      runId: 5435900
      artifact: binaries_signed
      path: $(Build.ArtifactStagingDirectory)

  - task: CopyFiles@2
    displayName: "Copy Dockerfile"
    inputs:
      Contents: Dockerfile
      TargetFolder: $(Build.ArtifactStagingDirectory)

  - task: Powershell@2
    displayName: "Set Docker Variables"
    name: SetVariables
    inputs:
      targetType: inline
      script: |
        $properties = ./eng/scripts/Get-ProjectProperties.ps1 -ProjectName "${{parameters.ServerName}}.csproj"
        $imageName = $properties.DockerImageName
        $version = $properties.Version
        Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$imageName"
        Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version$VersionSuffix"
        # Set DockerLocalTag both as a local and an output variable.
        $dockerLocalTag = "$(Build.Repository.Name)/server:$(Build.BuildId)"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag]$dockerLocalTag"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag;isOutput=true]$dockerLocalTag"
    env:
      VERSION_SUFFIX: "$(VersionSuffix)"

  - task: 1ES.BuildContainerImage@1
    displayName: Build Docker Image
    inputs:
      path: "$(Build.ArtifactStagingDirectory)"
      image: "$(DockerLocalTag)"
      buildArguments: |
        --build-arg PUBLISH_DIR="${{parameters.ServerName}}/linux-x64/dist"
      enableNetwork: true
      useBuildKit: true

  - script: |
      echo "Running container tests..."
      echo "Calling 'azmcp tools list'"
      # Override entrypoint to list tools directly instead of starting the server
      docker run --rm --entrypoint ./azmcp "$(DockerLocalTag)" tools list > "$(Build.ArtifactStagingDirectory)/tools.json"
      echo "tools list output (truncated):"
      head -n 40 "$(Build.ArtifactStagingDirectory)/tools.json" || true
      if grep -q '"status"[[:space:]]*:[[:space:]]*200' "$(Build.ArtifactStagingDirectory)/tools.json"; then
        echo "Status 200 confirmed in tools list output.";
      else
        echo "ERROR: tools list output did not contain status 200" >&2; exit 1;
      fi
    displayName: Run container smoke tests
  
  - script: |
      set -euo pipefail
      echo "Capturing image digest for $(DockerLocalTag)"
      digest="$(docker inspect --format='{{index .Id}}' "$(DockerLocalTag)")"
      if [ -z "$digest" ]; then
        echo "ERROR: Could not resolve image ID for $(DockerLocalTag)" >&2
        docker images | head
        exit 1
      fi
      echo "Image digest: $digest"
      echo "##vso[task.setvariable variable=DockerImageDigest;isOutput=true]$digest"
      echo "Saving image"
      docker save "$(DockerLocalTag)" -o "$(Build.ArtifactStagingDirectory)/image.tar"
      ls -lh "$(Build.ArtifactStagingDirectory)/image.tar"
    displayName: Capture image digest and save as .tar

  - task: 1ES.PublishPipelineArtifact@1
    displayName: "Publish docker staging artifact"
    inputs:
      path: $(Build.ArtifactStagingDirectory)
      artifact: docker_output