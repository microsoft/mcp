parameters:
- name: ServerName
  type: string
- name: DependsOn
  type: object

jobs:
- job: BuildDockerImage
  displayName: "Build Docker image"
  dependsOn: ${{ parameters.DependsOn }}
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - download: current
    artifact: binaries_signed
    displayName: "Download signed MCP server binaries"

  - task: CopyFiles@2
    displayName: "Copy Dockerfile"
    inputs:
      Contents: Dockerfile
      TargetFolder: $(Build.ArtifactStagingDirectory)

  - task: Powershell@2
    displayName: "Set Docker Variables"
    name: SetVariables
    inputs:
      targetType: inline
      script: |
        $properties = ./eng/scripts/Get-ProjectProperties.ps1 -ProjectName "${{parameters.ServerName}}.csproj"
        $imageName = $properties.DockerImageName
        $version = $properties.Version
        Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$imageName"
        Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version$VersionSuffix"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag;isOutput=true]$(Build.Repository.Name)/server:$(Build.BuildId)"
    env:
      VERSION_SUFFIX: "$(VersionSuffix)"

  - task: 1ES.BuildContainerImage@1
    displayName: Build Docker Image
    inputs:
      path: "$(Build.ArtifactStagingDirectory)"
      image: "$(DockerLocalTag)"
      buildArguments: |
        --build-arg PUBLISH_DIR="${{parameters.ServerName}}/linux-x64/dist"
      enableNetwork: true
      useBuildKit: true
  
  - script: |
      set -euo pipefail
      echo "Capturing image digest for $(DockerLocalTag)"
      digest="$(docker inspect --format='{{index .Id}}' "$(DockerLocalTag)")"
      if [ -z "$digest" ]; then
        echo "ERROR: Could not resolve image ID for $(DockerLocalTag)" >&2
        docker images | head
        exit 1
      fi
      echo "Image digest: $digest"
      echo "##vso[task.setvariable variable=DockerImageDigest;isOutput=true]$digest"
      echo "Saving image"
      docker save "$(DockerLocalTag)" -o "$(Build.ArtifactStagingDirectory)/image.tar"
      ls -lh "$(Build.ArtifactStagingDirectory)/image.tar"
    displayName: Capture image digest and save as .tar

  - task: 1ES.PublishPipelineArtifact@1
    displayName: "Publish docker staging artifact"
    inputs:
      path: $(Build.ArtifactStagingDirectory)
      artifact: docker_output