parameters:
- name: ServerName
  type: string
- name: DependsOn
  type: object

jobs:
- job: CreateDockerArtifact
  displayName: 'Creating Docker artifact'
  dependsOn: ${{ parameters.DependsOn }}
  pool:
    name: $(LINUXPOOL)
    image: $(LINUXVMIMAGE)
    os: linux

  steps:
  - task: DownloadPipelineArtifact@2
    displayName: 'Download signed packages'
    inputs:
      buildType: 'current'
      artifactName: binaries_signed
      targetPath: $(Build.ArtifactStagingDirectory)

  - task: CopyFiles@2
    displayName: 'Copy Dockerfile'
    inputs:
      Contents: 'Dockerfile'
      TargetFolder: $(Build.ArtifactStagingDirectory)

  - task: Powershell@2
    displayName: 'Set Docker Variables'
    name: SetVariables
    inputs:
      targetType: 'inline'
      script: |
        $properties = ./eng/scripts/Get-ProjectProperties.ps1 -ProjectName '${{parameters.ServerName}}.csproj'
        $imageName = $properties.DockerImageName
        $version = $properties.Version
        Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$imageName"
        Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version$VersionSuffix"
        Write-Host "##vso[task.setvariable variable=DockerLocalTag;isOutput=true]$(Build.Repository.Name)/server:$(Build.BuildId)"
    env:
      VERSION_SUFFIX: '$(VersionSuffix)'

  - task: 1ES.PublishPipelineArtifact@1
    inputs:
      path: $(Build.ArtifactStagingDirectory)
      artifact: docker_staged

  - task: 1ES.BuildContainerImage@1
    displayName: Build Docker Image
    inputs:
      path: '$(Pipeline.Workspace)/docker_staged'
      image: $(Build.Repository.Name)/server:$(Build.BuildId)
      buildArguments: |
        --build-arg PUBLISH_DIR="Azure.Mcp.Server/linux-x64/dist"
      enableNetwork: true
      useBuildKit: true

  - script: |
      echo "Running container tests..."
      docker run --rm $(Build.Repository.Name)/server:$(Build.BuildId) --help
      # Add real smoke/integration tests here
    displayName: Run container smoke tests
  
  - script: |
      $digest = docker inspect --format='{{index .Id}}' $(Build.Repository.Name)/server:$(Build.BuildId)
      echo "##vso[task.setvariable variable=DockerImageDigest;isOutput=true]$digest"
      docker save $(Build.Repository.Name)/server:$(Build.BuildId) -o image.tgz
    name: CaptureImage
    displayName: Capture image digest and save tgz

  - task: PublishPipelineArtifact@1
    displayName: Publish built image tgz
    inputs:
      targetPath: image.tgz
      artifact: docker_staged