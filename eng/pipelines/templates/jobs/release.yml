parameters:
- name: VsixTargets
  type: object
  default: []
- name: ServerName
  type: string
- name: IncludeNative
  type: boolean

jobs:
- job: TagRepository
  displayName: "Create release tag"
  condition: and(succeeded(), ne(variables['Skip.TagRepository'], 'true'))
  steps:
  - checkout: self

  - download: current
    displayName: Download build_details
    artifact: build_details

  - download: current
    displayName: Download packages_npm
    artifact: packages_npm

  - download: current
    displayName: Download packages_vsix_signed
    artifact: packages_vsix_signed

  - template: /eng/common/pipelines/templates/steps/retain-run.yml

  - pwsh: |
      $serverName = '${{ parameters.ServerName }}'
      $versionSuffix = $env:VERSIONSUFFIX
      $version = ./eng/scripts/Get-Version.ps1 -ServerName $serverName
      $tag = "$serverName-$version$versionSuffix"

      Write-Host "Creating GitHub release $tag"
      gh release create $tag --title "$serverName $version$versionSuffix"

      $releaseFiles = Get-ChildItem ./packages_npm -Filter *.tgz -Recurse
      $releaseFiles += Get-ChildItem ./packages_vsix_signed -Filter *.vsix -Recurse

      foreach ($releaseFile in $releaseFiles) {
          Write-Host "Uploading $releaseFile to GitHub release $tag"
          gh release upload $tag $releaseFile
      }
    displayName: Create GitHub Release and upload artifacts
    workingDirectory: $(Pipeline.Workspace)
    env:
      GH_TOKEN: $(azuresdk-github-pat)

- template: /eng/pipelines/templates/jobs/npm/release-npm.yml
  parameters:
    DependsOn: TagRepository

- template: /eng/pipelines/templates/jobs/vsix/release-vsix.yml
  parameters:
    DependsOn: TagRepository
    ServerName: ${{ parameters.ServerName }}

- template: /eng/pipelines/templates/jobs/docker/release-docker.yml
  parameters:
    DependsOn: TagRepository
    ServerName: ${{ parameters.ServerName }}

- job: UpdatePackageVersion
  displayName: "Update Package Versions"
  condition: and(succeeded(), ne(variables['Skip.UpdatePackageVersion'], 'true'))
  dependsOn: TagRepository
  steps:
  - checkout: self

  # Apply the version increment to each library, which updates the Cargo.toml and changelog files.
  - task: PowerShell@2
    displayName: Increment version
    inputs:
      targetType: filePath
      filePath: $(Build.SourcesDirectory)/eng/scripts/Update-ServerVersion.ps1
      arguments: >
        -ServerName '${{ parameters.ServerName }}'

  - template: /eng/common/pipelines/templates/steps/create-pull-request.yml
    parameters:
      PRBranchName: increment-package-version-$(Build.BuildId)
      CommitMsg: "Increment package version after release"
      PRTitle: "Increment version after release"
      RepoOwner: microsoft
