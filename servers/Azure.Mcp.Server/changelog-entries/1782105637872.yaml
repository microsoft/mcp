changes:
  - section: "Bugs Fixed"
    description: "Cap 'azmcp postgres list' database and table results at 10,000 entries to prevent unbounded enumeration on large servers, mirroring the existing 'azmcp mysql list' behavior. When the database list is truncated, a sentinel row is appended; when the table list is truncated, the response includes a 'tablesTruncated: true' flag."
