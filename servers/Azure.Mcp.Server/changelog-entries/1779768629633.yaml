changes:
  - section: "Features Added"
    description: "Added 'azmcp advisor recommendation summary' command to aggregate recommendations grouped by recommendation-type, category, impact, or resource-type. Added optional --category, --impact, --resource-type, --resource, and --search filters to both 'azmcp advisor recommendation list' and 'azmcp advisor recommendation summary'. Also added --top to 'azmcp advisor recommendation list'."
