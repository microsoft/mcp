changes:
  - section: "Features Added"
    description: "Added 'azmcp advisor recommendation summary' command to aggregate recommendations server-side grouped by recommendation-type, category, impact, or resource-type. --group-by is optional and defaults to 'category' when omitted, surfacing the high-level themes (Cost, Security, Reliability, etc.). Returns the full per-bucket count and a true 'TotalRecommendations' over the filtered population. Optional --top is a presentation cap on the number of displayed buckets (defaults to all); the 'Unknown' bucket is always pushed to the tail and preserved across slicing so uncategorized items remain visible. Added optional --category, --impact, --resource-type, --resource, and --search filters to both 'azmcp advisor recommendation list' and 'azmcp advisor recommendation summary'; --search supports natural-language phrases like 'related to Microsoft Foundry'. Both commands now return only active recommendations (status 'New'), excluding dismissed and postponed ones. Also added --top to 'azmcp advisor recommendation list'."
