pr: 2115
changes:
  - section: "Features Added"
    description: "Azure Monitor Instrumentation in the Monitor tool now supports guided onboarding for .NET, Node.js, and Python workloads, with framework-aware recommendations and code/package actions. Supported targets include ASP.NET Core, Worker Service, ASP.NET classic (including MVC/WebForms), Express, Fastify, NestJS, Next.js, LangChain.js, Node.js database/logging variants (Postgres, MongoDB, Redis, MySQL, Winston, Bunyan, console), and Python frameworks/apps (Django, Flask, FastAPI, Falcon, Starlette, GenAI, and generic console/script apps). .NET also supports brownfield migration guidance for Application Insights SDK to 3.x and enhancement flows for projects already on Application Insights 3.x or Azure Monitor Distro."