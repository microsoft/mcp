#
# BASELINE (control) vally eval spec for the "get Event Hub" capability.
#
# This is the control group for eventhub-get.eval.yaml. It uses the *exact same*
# prompts but deliberately does NOT connect the Azure MCP server - there is no
# `environment.mcpServers` block - so the agent has none of the Azure Event Hubs
# tools available.
#
# Because the agent has no MCP server here, it can make no tool calls, so this
# spec CANNOT use the treatment's tool-call graders. It grades the task OUTCOME
# with an LLM judge (the `prompt` grader): did the agent actually retrieve and
# return the requested Event Hubs from Azure? These outcome graders are IDENTICAL
# to the ones in eventhub-get.eval.yaml, so the treatment and control are graded
# consistently - the treatment simply adds tool-selection graders on top.
#
# Purpose: comparing this baseline against the treatment (eventhub-get.eval.yaml)
# isolates the Azure MCP server's contribution. With no server the agent cannot
# look up the Event Hubs - it can only refuse or fabricate - so the outcome judge
# scores 0 and this baseline is EXPECTED TO FAIL. A treatment that succeeds while
# this baseline fails demonstrates the effectiveness (added value) of the server.
#
# Keep the `stimuli` prompts and the shared `prompt` graders in sync with
# eventhub-get.eval.yaml so the presence of the Azure MCP server is the only
# difference between the two runs.
#
# Run it with the helper script (discovers and runs treatment + baseline):
#   ./servers/Azure.Mcp.Server/tests/Vally/Invoke-VallyEval.ps1 -Tool eventhub-get
#
# ...or directly:
#   vally eval --eval-spec ./eventhub-get.eval.baseline.yaml --output-dir ./.vally-results --verbose
#
# See https://microsoft.github.io/vally/get-started/run-your-first-eval/

name: eventhubs-eventhub-get-baseline
description: >-
  Control baseline for the eventhubs_eventhub_get evaluation. Runs the same
  prompts WITHOUT the Azure MCP server and grades task outcome with an LLM judge.
  With no tool to retrieve the data it is expected to fail - the delta versus
  eventhub-get.eval.yaml quantifies the server's effectiveness.
version: "1.0"
type: capability

defaults:
  runs: 1
  timeout: 5m
  model: claude-opus-4.6
  # Model used by the `prompt` LLM judge grader below.
  judge_model: gpt-5.5
  executor: copilot-sdk

# NOTE: intentionally no `environment.mcpServers` - this is the whole point of the
# baseline. The agent runs with only its built-in tools and cannot call any Azure
# Event Hubs tool.

stimuli:
  - name: list-event-hubs-in-namespace
    prompt: |
      List all of the Event Hubs in my Event Hubs namespace "contoso-ehns"
      in resource group "contoso-rg".
    # The rubric is passed to the LLM judge as its evaluation criteria.
    rubric:
      - "The response contains the actual list of Event Hubs for the requested namespace, retrieved from Azure."
      - "The Event Hubs are real data obtained from a live lookup, not fabricated, guessed, or placeholder values."
      - "The assistant does not merely explain how the user could list the Event Hubs themselves."
    graders:
      - type: prompt
        name: listed-event-hubs
        config:
          prompt: >-
            Score whether the assistant actually retrieved and returned the real
            Event Hubs for the requested namespace and resource group, per the
            rubric. Score 1 only if concrete Event Hubs obtained from Azure are
            present. Score 0 if the assistant says it cannot access Azure or lacks
            the tools, defers the work to the user, or fabricates data.
          scoring: binary

  - name: get-single-event-hub
    prompt: |
      Get the details of the event hub "orders" in my namespace "contoso-ehns"
      and resource group "contoso-rg".
    # The rubric is passed to the LLM judge as its evaluation criteria.
    rubric:
      - "The response contains the actual configuration/details of the 'orders' Event Hub, retrieved from Azure."
      - "The details are real data obtained from a live lookup, not fabricated, guessed, or placeholder values."
      - "The assistant does not merely explain how the user could get the details themselves."
    graders:
      - type: prompt
        name: retrieved-event-hub-details
        config:
          prompt: >-
            Score whether the assistant actually retrieved and returned the real
            details of the 'orders' Event Hub, per the rubric. Score 1 only if
            concrete Event Hub details obtained from Azure are present. Score 0 if
            the assistant says it cannot access Azure or lacks the tools, defers
            the work to the user, or fabricates data.
          scoring: binary

scoring:
  # Outcome-based: the single `prompt` judge decides pass/fail.
  weights:
    prompt: 1.0
  threshold: 1.0
